name: Sync upstream

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork with upstream
        run: gh repo sync ${{ github.repository }} --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
